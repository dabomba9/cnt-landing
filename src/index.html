  <body>
    <cnt-workspace-root></cnt-workspace-root>

    <!-- n8n Chat Widget -->
    <div id="n8n-chat"></div>
    <link href="https://cdn.jsdelivr.net/npm/@n8n/chat/dist/style.css" rel="stylesheet">
    <style>
      :root {
        --chat--color-primary: #e3530d;
        --chat--color-primary-shade-50: #ffdede;
        --chat--color-primary-shade-100: #e3890d;
        --chat--color-secondary: #F6D5C4;
        --chat--color-secondary-shade-50: #ffdede;
        --chat--color-white: #ffffff;
        --chat--color-light: #f7f5ec;
        --chat--color-dark: #000;
        --chat--window--width: 400px;
        --chat--window--height: 600px;
        --chat--window--border: solid 1px #000;
        --chat--header--background: #F6D5C4;
        --chat--header--color: #000;
        --chat--message--user--background: var(--chat--color-secondary);
        --chat--message--user--color: var(--chat--color-white);
        --chat--toggle--background: var(--chat--color-primary);
        --chat--toggle--color: var(--chat--color-white);
        --chat--toggle--size: 64px;
      }
    </style>
    <script type="module">
      import { createChat } from 'https://cdn.jsdelivr.net/npm/@n8n/chat/dist/chat.bundle.es.js';
      createChat({
        webhookUrl: 'https://thetinktank.app.n8n.cloud/webhook/53c136fe-3e77-4709-a143-fe82746dd8b6/chat',
        webhookConfig: { method: 'POST', headers: {} },
        target: '#n8n-chat',
        mode: 'window',
        chatInputKey: 'chatInput',
        chatSessionKey: 'sessionId',
        metadata: {},
        showWelcomeScreen: false,
        defaultLanguage: 'en',
        initialMessages: [
          'Hi there! 👋',
          'My name is Ricky. How can I assist you today?'
        ],
        i18n: {
          en: {
            subtitle: "Start a chat. We're here to help you 24/7.",
            footer: '',
            getStarted: 'New Conversation',
            inputPlaceholder: 'Type your question..',
          },
        },
      });
    </script>
  </body>
