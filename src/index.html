<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="preconnect" href="https://use.typekit.net" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <!-- Webflow CDN — home-hero poster + video lives here, so warming
         the connection saves the LCP a TLS roundtrip. -->
    <link rel="preconnect" href="https://cdn.prod.website-files.com" crossorigin>

    <!-- Preload critical fonts -->
    <link rel="preload" href="/fonts/FamiljenGrotesk-VariableFont_wght.ttf" as="font" type="font/ttf" crossorigin>
    <link rel="preload" href="/fonts/FamiljenGrotesk-Italic-VariableFont_wght.ttf" as="font" type="font/ttf" crossorigin>

    <!-- Preload the home-hero LCP poster so it's ready when the
         video element resolves it as a background-image. -->
    <link rel="preload" as="image"
      href="https://cdn.prod.website-files.com/5fbe83fe8b482568c9db3c4f/662c82d2c197518b9c6f47d4_watermarked_preview%20(1)-poster-00001.jpg"
      fetchpriority="high">
    <link href="https://fonts.googleapis.com/css2?family=Asap+Condensed:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Familjen+Grotesk:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
    <meta charset="utf-8" />
    <title>CurbNTurf | Find Your RV Spot — Private Land Camping & Stays</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Find unique private RV spots on farms, vineyards, and ranches across the US. Book directly with hosts. No membership fees. The RV Freedom Experience." />
    <meta name="robots" content="index, follow" />

    <!-- Favicons -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="mask-icon" href="/safari-pinned-tab.svg" color="#5bbad5">
    <meta name="msapplication-TileColor" content="#da532c">
    <meta name="theme-color" content="#ffffff">

    <!-- Open Graph -->
    <meta property="og:url" content="https://www.curbnturf.com">
    <meta property="og:type" content="website">
    <meta property="og:title" content="CurbNTurf | Find Your RV Spot">
    <meta property="og:description" content="Find unique private RV spots on farms, vineyards, and ranches. Book directly with hosts. No membership fees.">
    <!-- P49/A — default share card. og-default.jpg was a 404; pointing to a
         brand-styled webp that actually ships. Replace with a designed
         1200×630 jpg when authored. -->
    <meta property="og:image" content="https://www.curbnturf.com/assets/images/community_category.webp">
    <meta property="og:image:width" content="1024">
    <meta property="og:image:height" content="1024">
    <meta property="og:image:type" content="image/webp">
    <meta property="og:image:alt" content="CurbNTurf — private land for RV stays">
    <meta property="og:site_name" content="CurbNTurf">

    <!-- Twitter / X Cards -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:site" content="@curbnturf">
    <meta name="twitter:title" content="CurbNTurf | Find Your RV Spot">
    <meta name="twitter:description" content="Find unique private RV spots on farms, vineyards, and ranches. Book directly with hosts. No membership fees.">
    <meta name="twitter:image" content="https://www.curbnturf.com/assets/images/community_category.webp">
    <meta name="twitter:image:alt" content="CurbNTurf — private land for RV stays">

    <!-- P51/A — Material Symbols loaded non-blocking. preload+as=style
         gets the bytes off the critical render path; the onload swap
         promotes it to an active stylesheet once fetched. NoScript
         fallback keeps icons usable without JS. -->
    <link rel="preload"
          href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
          as="style"
          onload="this.onload=null;this.rel='stylesheet'"/>
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"/>
    </noscript>
  </head>
  <body>
    <cnt-workspace-root></cnt-workspace-root>
  </body>
</html>
