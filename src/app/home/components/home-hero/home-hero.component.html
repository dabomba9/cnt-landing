    <!-- Hero Section -->
    <div class="hero-wrap relative">

      <div class="sticky-wrap-hero" (click)="toggleVideo($event)">
        <div class="sticky-element">
          <div class="sticky-content">
            <div class="video-wrapper">
              <div class="background-video cnt-background-video">
                <video #heroVideo autoplay loop muted playsinline data-object-fit="cover"
                  style="background-image:url('https://cdn.prod.website-files.com/5fbe83fe8b482568c9db3c4f/662c82d2c197518b9c6f47d4_watermarked_preview%20(1)-poster-00001.jpg');object-fit:cover;width:100%;height:100%;">
                  <source src="https://cdn.prod.website-files.com/5fbe83fe8b482568c9db3c4f/662c82d2c197518b9c6f47d4_watermarked_preview%20(1)-transcode.mp4">
                  <source src="https://cdn.prod.website-files.com/5fbe83fe8b482568c9db3c4f/662c82d2c197518b9c6f47d4_watermarked_preview%20(1)-transcode.webm">
                </video>
              </div>
            </div>
          </div>
          <div class="sticky-bg">
            <div class="search-hero-outer">
              <div class="hero-preheading text-trinidad font-bold text-xs tracking-[0.2em] mb-4 text-left uppercase w-full">
                The RV Freedom Experience
              </div>
              <div class="search-hero-inner w-full flex flex-col items-start">
                <h1 data-stagger-list class="hero-heading text-trinidad relative z-10" style="font-size: clamp(10rem, 32vw, 440px) !important; line-height: 0.8 !important; font-weight: 800 !important; white-space: normal !important; text-align: left !important; width: 100% !important; margin-left: 0 !important;">
                  <span style="display: block !important; width: 100% !important; overflow: hidden;"><span class="hero-span inline-block">Discover</span> <span class="hero-span inline-block">Your</span></span>
                  <span style="display: block !important; width: 100% !important; overflow: hidden;"><span class="hero-span inline-block">Next</span> <span class="hero-span inline-block">Horizon</span></span>
                </h1>
                <div class="flex bg-[#F2F0E9] rounded-full p-1.5 w-max mb-1 shadow-inner border border-outline-gray/20">
                  <button (click)="setSearchMode('destination')" class="px-5 py-1.5 rounded-full text-[13px] tracking-wide font-headline cursor-pointer transition-all duration-300" [class.bg-white]="searchMode === 'destination'" [class.text-dark-text]="searchMode === 'destination'" [class.shadow-md]="searchMode === 'destination'" [class.text-muted-text]="searchMode !== 'destination'">Destination</button>
                  <button (click)="setSearchMode('roadtrip')" class="px-5 py-1.5 rounded-full text-[13px] tracking-wide font-headline cursor-pointer transition-all duration-300" [class.bg-white]="searchMode === 'roadtrip'" [class.text-dark-text]="searchMode === 'roadtrip'" [class.shadow-md]="searchMode === 'roadtrip'" [class.text-muted-text]="searchMode !== 'roadtrip'">Roadtrip</button>
                </div>
                <div class="bg-white/95 backdrop-blur-xl rounded-[2.5rem] p-2 md:p-1 flex flex-col md:flex-row items-center gap-2 shadow-2xl border border-jungle-green/10 mt-2 w-full md:w-auto md:min-w-[850px] lg:min-w-[1000px]">
                  
                  @if(searchMode === 'destination') {
                    <div class="flex-[2] w-full flex items-center gap-4 px-8 py-4 border-b md:border-b-0 md:border-r border-outline-gray/50 min-h-[72px]">
                      <span class="material-symbols-outlined text-jungle-green shrink-0" data-icon="location_on">location_on</span>
                      <div class="flex flex-col text-left w-full">
                        <span class="text-[10px] uppercase tracking-widest font-bold text-muted-text">Where to?</span>
                        <input class="bg-transparent border-none p-0 focus:ring-0 text-dark-text text-[15px] font-medium placeholder:text-outline-gray w-full h-[22px]" placeholder="Search destinations" type="text"/>
                      </div>
                    </div>
                    <div class="flex-1 w-full flex items-center gap-4 px-8 py-4 border-b md:border-b-0 md:border-r border-outline-gray/50 min-h-[72px] cursor-pointer">
                      <span class="material-symbols-outlined text-jungle-green shrink-0" data-icon="calendar_today">calendar_today</span>
                      <div class="flex flex-col text-left">
                        <span class="text-[10px] uppercase tracking-widest font-bold text-muted-text">When</span>
                        <span class="text-outline-gray text-[15px] font-medium whitespace-nowrap">Add dates</span>
                      </div>
                    </div>
                    <div class="flex-1 w-full flex items-center gap-4 px-8 py-4 min-h-[72px] cursor-pointer">
                      <span class="material-symbols-outlined text-jungle-green shrink-0" data-icon="rv_hookup">rv_hookup</span>
                      <div class="flex flex-col text-left">
                        <span class="text-[10px] uppercase tracking-widest font-bold text-muted-text">Your Rig</span>
                        <span class="text-outline-gray text-[15px] font-medium whitespace-nowrap">Type & Length</span>
                      </div>
                    </div>
                  } @else {
                    <div class="flex-[2] w-full flex items-center gap-4 px-8 py-4 border-b md:border-b-0 md:border-r border-outline-gray/50 min-h-[72px]">
                      <span class="material-symbols-outlined text-jungle-green shrink-0" data-icon="location_on">location_on</span>
                      <div class="flex flex-col text-left w-full">
                        <span class="text-[10px] uppercase tracking-widest font-bold text-muted-text">Starting location</span>
                        <input class="bg-transparent border-none p-0 focus:ring-0 text-dark-text text-[15px] font-medium placeholder:text-outline-gray w-full h-[22px]" placeholder="Enter starting point" type="text"/>
                      </div>
                    </div>
                    <div class="flex-[2] w-full flex items-center gap-4 px-8 py-4 border-b md:border-b-0 md:border-r border-outline-gray/50 min-h-[72px]">
                      <span class="material-symbols-outlined text-jungle-green shrink-0" data-icon="location_on">location_on</span>
                      <div class="flex flex-col text-left w-full">
                        <span class="text-[10px] uppercase tracking-widest font-bold text-muted-text">Where to?</span>
                        <input class="bg-transparent border-none p-0 focus:ring-0 text-dark-text text-[15px] font-medium placeholder:text-outline-gray w-full h-[22px]" placeholder="Search destinations" type="text"/>
                      </div>
                    </div>
                    <div class="flex-[1.5] w-full flex items-center gap-4 px-8 py-4 min-h-[72px] cursor-pointer">
                      <span class="material-symbols-outlined text-jungle-green shrink-0" data-icon="rv_hookup">rv_hookup</span>
                      <div class="flex flex-col text-left">
                        <span class="text-[10px] uppercase tracking-widest font-bold text-muted-text">Your Rig</span>
                        <span class="text-outline-gray text-[15px] font-medium whitespace-nowrap pt-[2px]">Type & Length</span>
                      </div>
                    </div>
                  }

                  <div class="btn-3d-wrap shrink-0 ml-2 md:mr-2 h-16 w-16" (click)="toggleVideo($event)">
                    <button class="btn-3d-inner relative w-full h-full rounded-full">
                      <div class="btn-3d-front absolute inset-0 bg-trinidad text-white rounded-full flex items-center justify-center shadow-lg">
                        <span class="material-symbols-outlined" data-icon="search">search</span>
                      </div>
                      <div class="btn-3d-back absolute inset-0 bg-jungle-green text-white rounded-full flex items-center justify-center shadow-lg">
                        <span class="material-symbols-outlined" data-icon="search">search</span>
                      </div>
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
