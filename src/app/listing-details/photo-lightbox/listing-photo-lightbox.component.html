@if (open) {
  <div id="lightbox-root" role="dialog" aria-modal="true" [attr.aria-label]="'Photo gallery — ' + title"
    class="fixed inset-0 z-[10000] bg-black/95 flex flex-col" (click)="close()">
    <!-- Top bar -->
    <div class="flex items-center justify-between px-6 py-4 text-white">
      <button type="button" (click)="$event.stopPropagation(); close()" class="inline-flex items-center justify-center w-10 h-10 rounded-full hover:bg-white/10 transition-colors" aria-label="Close gallery">
        <span class="material-symbols-outlined">close</span>
      </button>
      <div class="font-body text-sm">
        {{ index + 1 }} / {{ photos.length }}
      </div>
      <div class="w-10"></div>
    </div>
    <!-- Main photo -->
    <div class="flex-1 flex items-center justify-center px-4 md:px-12 pb-6 relative"
      (touchstart)="onTouchStart($event)" (touchend)="onTouchEnd($event)">
      <button type="button" (click)="$event.stopPropagation(); prev()" class="absolute left-4 md:left-8 top-1/2 -translate-y-1/2 w-12 h-12 rounded-full bg-white/95 hover:bg-white text-dark-text flex items-center justify-center shadow-lg z-10" aria-label="Previous photo">
        <span class="material-symbols-outlined">chevron_left</span>
      </button>
      <img [src]="photos[index]" [alt]="title + ' photo ' + (index + 1)"
        class="max-w-full max-h-full object-contain transition-opacity duration-150"
        [class.opacity-0]="fading"
        (click)="$event.stopPropagation()">
      <button type="button" (click)="$event.stopPropagation(); next()" class="absolute right-4 md:right-8 top-1/2 -translate-y-1/2 w-12 h-12 rounded-full bg-white/95 hover:bg-white text-dark-text flex items-center justify-center shadow-lg z-10" aria-label="Next photo">
        <span class="material-symbols-outlined">chevron_right</span>
      </button>
    </div>
    <!-- Thumbnail strip -->
    <div class="flex gap-2 px-6 pb-6 overflow-x-auto" (click)="$event.stopPropagation()">
      @for (photo of photos; track $index) {
        <button type="button" (click)="fadeSwap($index)"
          [class.ring-2]="$index === index"
          [class.ring-white]="$index === index"
          [class.opacity-50]="$index !== index"
          class="flex-shrink-0 w-20 h-16 rounded-lg overflow-hidden hover:opacity-100 transition-opacity">
          <img [src]="photo" [alt]="''" class="w-full h-full object-cover">
        </button>
      }
    </div>
  </div>
}
