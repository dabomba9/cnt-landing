<article class="bg-white rounded-2xl border border-dark-text/8 p-6">
  <div class="flex items-center gap-3 mb-3">
    <div class="w-10 h-10 rounded-full bg-jungle-green/15 flex items-center justify-center">
      <span class="font-body font-bold text-sm text-jungle-green">{{ review.authorInitials }}</span>
    </div>
    <div>
      <div class="font-body font-bold text-sm text-dark-text">{{ review.authorName }}</div>
      <div class="text-xs text-muted-text font-body">{{ review.date }}</div>
    </div>
  </div>
  <div class="flex items-center gap-1 mb-2">
    @for (i of stars; track i) {
      @switch (starState(i, review.rating)) {
        @case ('full') {
          <span class="material-symbols-outlined text-sm text-trinidad" style="font-variation-settings: 'FILL' 1;">star</span>
        }
        @case ('half') {
          <span class="material-symbols-outlined text-sm text-trinidad" style="font-variation-settings: 'FILL' 1;">star_half</span>
        }
        @default {
          <span class="material-symbols-outlined text-sm text-dark-text opacity-20" style="font-variation-settings: 'FILL' 1;">star</span>
        }
      }
    }
    <span class="ml-1 text-xs font-body font-bold text-dark-text">{{ review.rating.toFixed(1) }}</span>
  </div>
  <p class="text-base font-body text-dark-text leading-relaxed">{{ review.text }}</p>
</article>
