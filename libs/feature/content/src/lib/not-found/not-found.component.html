<cnt-navbar></cnt-navbar>

<main class="pt-28 md:pt-32 min-h-screen bg-cream bg-grid-subtle flex items-center">
  <section class="px-[2%] w-full pb-24 md:pb-32">
    <div class="max-w-[90rem] mx-auto px-4 md:px-8">
      <div class="max-w-2xl mx-auto text-center">

        <span class="text-trinidad font-label uppercase tracking-[0.14em] text-[0.7rem] font-bold mb-4 block">404 · Off-trail</span>

        <h1 class="font-headline font-bold text-dark-text tracking-tight leading-[0.95]" style="font-size: clamp(2.5rem, 7vw, 6rem);">
          Wrong exit.<br>Let's get you<br>back on the road.
        </h1>

        <p class="mt-6 text-muted-text text-base md:text-xl font-body leading-relaxed">
          The page you were looking for isn't here. Here's what most folks come back for:
        </p>

        <!-- 3-up CTA grid — the three most common destinations.
             Stacks at small mobile, lays out at sm+. -->
        <div class="mt-10 grid grid-cols-1 sm:grid-cols-3 gap-3">
          <a routerLink="/search" class="group flex flex-col items-center gap-2 px-4 py-6 rounded-2xl bg-trinidad text-white hover:opacity-95 transition-opacity">
            <span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;" aria-hidden="true">explore</span>
            <span class="text-xs uppercase tracking-[0.12em] font-button font-bold">Find a stay</span>
          </a>
          <a routerLink="/host" class="group flex flex-col items-center gap-2 px-4 py-6 rounded-2xl bg-jungle-green text-white hover:opacity-95 transition-opacity">
            <span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;" aria-hidden="true">home_work</span>
            <span class="text-xs uppercase tracking-[0.12em] font-button font-bold">Become a host</span>
          </a>
          <a routerLink="/help" class="group flex flex-col items-center gap-2 px-4 py-6 rounded-2xl bg-white border border-dark-text/15 text-dark-text hover:border-trinidad hover:text-trinidad transition-colors">
            <span class="material-symbols-outlined text-2xl" aria-hidden="true">support</span>
            <span class="text-xs uppercase tracking-[0.12em] font-button font-bold">Visit help</span>
          </a>
        </div>

        <!-- Decorative compass-y divider -->
        <div class="mt-12 flex items-center justify-center gap-3 text-trinidad/40">
          <span class="block h-px w-16 bg-current"></span>
          <span class="material-symbols-outlined text-xl" aria-hidden="true" style="font-variation-settings: 'FILL' 1;">explore</span>
          <span class="block h-px w-16 bg-current"></span>
        </div>

        <p class="mt-6 text-sm text-muted-text font-body">
          Still lost? <a routerLink="/contact" class="text-trinidad font-bold hover:underline">Drop us a line</a> and we'll point you in the right direction.
        </p>

      </div>
    </div>
  </section>
</main>

<curbnturf-footer></curbnturf-footer>
