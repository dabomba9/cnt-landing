name: Lighthouse CI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    name: Audit Vercel preview
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Wait for Vercel deploy
        # Give Vercel ~6 minutes to rebuild + deploy this commit
        # before auditing. A future iteration can poll the Vercel
        # API for the specific deployment matching this commit SHA.
        run: sleep 360

      - name: Audit URLs with Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./.lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
